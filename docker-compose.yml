services:
  postgres:
    image: postgres:16-alpine
    container_name: kubesherlock-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kubesherlock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kubesherlock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kubesherlock

  prometheus:
    image: prom/prometheus:latest
    container_name: kubesherlock-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    # host.docker.internal lets prometheus reach the metrics server running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kubesherlock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:

networks:
  kubesherlock:
    driver: bridge
