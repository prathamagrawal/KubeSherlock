image:
  repository: prathamagrawal/kubesherlock
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: kubesherlock

rbac:
  create: true

config:
  # Watcher settings
  watcherEnabled: true
  watcherPollInterval: 60
  watcherRestartThreshold: 3
  watcherCooldown: 300

  # LLM provider (anthropic or openai)
  llmProvider: openai

  # Namespace monitoring (empty = all namespaces)
  allowedNamespaces: ["default"]

  # Logging
  logLevel: INFO

  # Email alerts
  emailEnabled: true

# Secrets — set existingSecret to use a pre-created k8s secret (recommended)
# Or set anthropicApiKey / openaiApiKey directly (not recommended for production)
secrets:
  anthropicApiKey: ""
  openaiApiKey: ""
  smtpUser: ""
  smtpPassword: ""
  # Name of an existing secret containing API keys
  existingSecret: ""

# Email configuration (used when config.emailEnabled: true)
email:
  smtpHost: smtp.gmail.com
  smtpPort: 587
  smtpUseTls: true
  smtpFrom: ""
  alertEmailTo: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}
