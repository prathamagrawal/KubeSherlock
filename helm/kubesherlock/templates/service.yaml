{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kubesherlock-metrics
  labels:
    app.kubernetes.io/name: kubesherlock
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: {{ .Values.metrics.port }}
    targetPort: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/name: kubesherlock
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
