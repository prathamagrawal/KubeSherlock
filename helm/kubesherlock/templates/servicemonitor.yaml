{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
# ServiceMonitor — requires the Prometheus Operator (kube-prometheus-stack) to be installed.
# With this resource Prometheus auto-discovers the /metrics endpoint; no manual scrape_config needed.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-kubesherlock
  namespace: {{ .Values.metrics.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubesherlock
    app.kubernetes.io/instance: {{ .Release.Name }}
    # This label must match the Prometheus Operator's serviceMonitorSelector
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubesherlock
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: metrics
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  endpoints:
  - port: metrics
    path: /metrics
    interval: {{ .Values.metrics.serviceMonitor.interval }}
    scheme: http
{{- end }}
