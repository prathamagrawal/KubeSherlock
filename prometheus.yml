global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kubesherlock-agent'
    static_configs:
      - targets: ['localhost:8000']
    scrape_interval: 10s

  - job_name: 'kubesherlock-db'
    static_configs:
      - targets: ['localhost:5432']
    metrics_path: '/metrics'
    scrape_interval: 30s
